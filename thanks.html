<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You! | Realtor Marketing Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a365d, #2c5282);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 60px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }
        .emoji { font-size: 4rem; margin-bottom: 20px; }
        h1 {
            font-family: 'Playfair Display', serif;
            color: #1a365d;
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        p { color: #666; font-size: 1.1rem; line-height: 1.8; margin-bottom: 20px; }
        .highlight { color: #c53030; font-weight: 600; }
        a.btn {
            display: inline-block;
            background: linear-gradient(135deg, #c53030, #9b2c2c);
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 20px;
            transition: transform 0.3s;
        }
        a.btn:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji">🎉</div>
        <h1>Thank You!</h1>
        <p>Your assessment has been submitted successfully.</p>
        <p>We'll review your answers and reach out within <span class="highlight">24-48 hours</span> with a custom marketing plan tailored to your real estate business.</p>
        <p>In the meantime, check out your demo website!</p>
        <a href="index.html" class="btn">🏠 View Demo Website</a>
    </div>
</body>
</html>
